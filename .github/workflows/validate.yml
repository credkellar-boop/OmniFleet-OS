name: OmniFleet Architecture Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi pyyaml smartcar google-generativeai strawberry-graphql

    - name: Setup Go environment
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Setup Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Validate Core Routing Engine
      run: python -m py_compile main.py
      
    - name: Run Aegis Security Fuzzing
      run: python security/redteam_fuzzer.py
