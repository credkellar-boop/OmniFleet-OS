system:
  mode: "BUSINESS" # Options: PERSONAL, BUSINESS, TURNOVER
  autonomous_enabled: true
  api_keys:
    uber: "INSERT_UBER_KEY"
    turo: "INSERT_TURO_KEY"
  thresholds:
    min_battery_dispatch: 0.25
    surge_multiplier: 1.5
    
security_and_identity:
  biometrics_enabled: true     # Master toggle for all auth
  face_auth_enabled: true      # Toggle specifically for face recognition
  voice_control_enabled: true  # Toggle specifically for voice commands
  encryption_level: "AES-256"

flight_system:
  aerospace_enabled: true
  hypersonic_safety_limit: 5.5 # Mach limit
  default_mode: "DRONE"
  pre_flight_check: true

security:
  # Disables takeoff if GPS is in a No-Fly Zone
  enforce_no_fly_zones: true 
  
infotainment:
  default_streaming_quality: "4K"
  auto_connect_bluetooth: true
  delivery_platform_priority: 
    - "UBEREATS"
    - "DOORDASH"
    - "GRUBHUB"

api_secrets:
  streaming_token: "ENV_STREAM_KEY"
  delivery_api_key: "ENV_DELIVERY_KEY"
  
# Path: omni_config.yaml
fleet_name: "OmniFleet-OS"
version: "1.0.0"

hardware:
  compute_target: "hardware_agnostic" 
  chassis_type: "Skateboard_V2"

# Wallet and settlement configuration explicitly scoped to the network layer
network:
  mesh_port: 8899
  wallet_config:
    enabled: true
    address: "0x8920...3A19"
    preferred_token: "BULLISH"
    auto_sweep_threshold: 150.00
    
security:
  aegis_audit_enabled: true
  fail_secure_mode: true
